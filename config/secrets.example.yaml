# ---------------------------------------------------------------------------
# Local credentials TEMPLATE (safe to commit — contains only placeholders).
#
# 1. Copy it to config/secrets.yaml:
#        cp config/secrets.example.yaml config/secrets.yaml
# 2. Put your real keys in config/secrets.yaml.
#        config/secrets.yaml is git-ignored, so the real key is never committed.
# 3. Run with it:
#        uv run nf-curator run --config config/secrets.yaml --retmax 8 \
#            --query "neurofibromatosis[Title] AND open access[filter]"
#
# (Any YAML matching config/secrets.yaml, config/*.local.yaml, or *.secret.yaml
#  is git-ignored — see .gitignore.)
# ---------------------------------------------------------------------------

ncbi:
  email: you@example.com            # identify yourself to NCBI (recommended)
  # api_key: ncbi-key-here          # optional: raises NCBI rate limit 3 -> 10 req/s

vision:
  classify_images: true             # enable Claude-vision modality classification
  model: claude-haiku-4-5           # or claude-sonnet-4-6 / claude-opus-4-8
  api_key: sk-ant-REPLACE-WITH-YOUR-ANTHROPIC-KEY
